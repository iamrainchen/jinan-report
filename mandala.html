<!DOCTYPE html>
<html lang="zh-TW">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>金安分會 · 產業九宮格</title>
<link href="https://fonts.googleapis.com/css2?family=Noto+Serif+TC:wght@400;600&family=Noto+Sans+TC:wght@300;400;500&display=swap" rel="stylesheet">
<style>
:root {
  --paper:#F8F6F2; --surface:#FFFFFF;
  --gold:#B8952A; --gold-pale:#F2EAD3;
  --ink:#2A2218; --ink-mid:#5A4E3A; --ink-soft:#9A8E78; --ink-faint:#C8C0B0;
  --radius:10px; --gap:8px;
}
*{box-sizing:border-box;margin:0;padding:0;}
html{scroll-behavior:smooth;}
body{background:var(--paper);font-family:'Noto Sans TC',sans-serif;color:var(--ink);min-height:100vh;}

/* ── HEADER ── */
.header{text-align:center;padding:1.4rem 1rem 1.1rem;background:var(--surface);border-bottom:1px solid var(--gold-pale);}
.header h1{font-family:'Noto Serif TC',serif;font-size:1.3rem;font-weight:600;letter-spacing:.1em;}
.header-line{width:36px;height:1.5px;background:var(--gold);margin:.5rem auto .35rem;}
.header p{font-size:.68rem;color:var(--ink-soft);letter-spacing:.05em;}

/* ── NAV BAR ── */
.nav-bar{display:flex;align-items:center;flex-wrap:wrap;gap:4px;padding:.55rem 1rem;font-size:.7rem;color:var(--ink-soft);background:var(--surface);border-bottom:1px solid #EDEAE4;min-height:32px;}
.nav-link{color:var(--gold);cursor:pointer;}
.nav-link:active{opacity:.7;}
.nav-sep{color:var(--ink-faint);}
.nav-cur{color:var(--ink-mid);font-weight:500;}

/* ── LEGEND ── */
.legend{display:flex;gap:1.2rem;justify-content:center;padding:.45rem 1rem;font-size:.65rem;color:var(--ink-soft);background:var(--surface);border-bottom:1px solid #EDEAE4;}
.leg{display:flex;align-items:center;gap:4px;}
.leg-dot{width:6px;height:6px;border-radius:50%;background:var(--ink-soft);}
.leg-ring{width:6px;height:6px;border-radius:50%;border:1.5px solid var(--ink-faint);}

/* ── HINT ── */
.hint-bar{text-align:center;font-size:.65rem;color:var(--ink-faint);padding:.5rem 0 .2rem;letter-spacing:.04em;}

/* ── STAGE ── */
.stage{padding:.9rem;max-width:760px;margin:0 auto;}

/* ════════════════════════════════
   DESKTOP: 3×3 mandala grid
   ════════════════════════════════ */
.mandala{display:grid;grid-template-columns:repeat(3,1fr);gap:var(--gap);}

.cell{background:var(--surface);border-radius:var(--radius);border:1px solid #E8E4DC;padding:11px 10px;min-height:108px;cursor:pointer;transition:box-shadow .14s,transform .14s;position:relative;overflow:hidden;}
.cell:hover{box-shadow:0 3px 14px rgba(0,0,0,.08);transform:translateY(-1px);}
.cell.no-hover:hover{box-shadow:none;transform:none;cursor:default;}
.cell.empty-cell{cursor:default;border-style:dashed;border-color:var(--ink-faint);background:#FAFAF8;}
.cell.empty-cell:hover{box-shadow:none;transform:none;}
.cell.center-cell{cursor:default;display:flex;flex-direction:column;align-items:center;justify-content:center;text-align:center;}

.cell-accent{position:absolute;top:0;left:0;right:0;height:3px;border-radius:var(--radius) var(--radius) 0 0;}
.ct{font-family:'Noto Serif TC',serif;font-size:13px;font-weight:600;margin-bottom:7px;line-height:1.3;}
.ci{font-size:12px;line-height:2;display:flex;align-items:center;gap:4px;}
.ci-dot{width:6px;height:6px;border-radius:50%;flex-shrink:0;}
.ci-ring{width:6px;height:6px;border-radius:50%;border:1.2px solid;flex-shrink:0;background:transparent;}
.ci-more{font-size:11px;color:var(--ink-faint);margin-top:2px;}

.cc-title{font-family:'Noto Serif TC',serif;font-size:15px;font-weight:600;letter-spacing:.06em;margin-bottom:3px;}
.cc-sub{font-size:11px;letter-spacing:.04em;margin-bottom:8px;}
.cc-stats{display:grid;grid-template-columns:1fr 1fr;gap:4px;width:100%;}
.cc-stat{border-radius:4px;padding:3px 0;font-size:11px;text-align:center;}
.cc2-title{font-family:'Noto Serif TC',serif;font-size:14px;font-weight:600;letter-spacing:.05em;margin-bottom:3px;}
.cc2-sub{font-size:11px;}

.empty-label{font-size:10px;font-weight:500;color:var(--ink-faint);margin-bottom:4px;letter-spacing:.05em;}
.empty-title{font-size:12px;color:var(--ink-soft);margin-bottom:3px;}
.empty-note{font-size:10px;color:var(--ink-faint);}

.avatar{width:44px;height:44px;border-radius:50%;display:flex;align-items:center;justify-content:center;font-family:'Noto Serif TC',serif;font-size:16px;font-weight:600;margin:0 auto 7px;}
.member-name{font-family:'Noto Serif TC',serif;font-size:15px;font-weight:600;margin-bottom:2px;}
.member-role{font-size:11px;color:rgba(255,255,255,.8);}
.member-multi{display:flex;flex-direction:column;gap:6px;width:100%;}
.m-row{display:flex;align-items:center;gap:6px;}
.m-av{width:28px;height:28px;border-radius:50%;display:flex;align-items:center;justify-content:center;font-size:11px;font-weight:600;flex-shrink:0;}
.m-name{font-size:12px;font-weight:500;}
.m-role-s{font-size:10px;color:rgba(255,255,255,.7);}
.svc-title{font-size:12px;font-weight:500;line-height:1.5;}

/* ════════════════════════════════
   MOBILE: card list layout
   ════════════════════════════════ */
@media (max-width: 540px) {
  .stage{padding:.65rem .75rem;}

  /* hide grid, show list */
  .mandala{display:none;}
  .card-list{display:flex;flex-direction:column;gap:8px;}

  /* L1 industry card */
  .m-ind-card{background:var(--surface);border-radius:var(--radius);border:1px solid #E8E4DC;overflow:hidden;cursor:pointer;transition:box-shadow .14s;}
  .m-ind-card:active{opacity:.85;}
  .m-ind-header{display:flex;align-items:center;gap:10px;padding:12px 14px 10px;}
  .m-ind-stripe{width:4px;border-radius:2px;flex-shrink:0;align-self:stretch;}
  .m-ind-info{flex:1;min-width:0;}
  .m-ind-title{font-family:'Noto Serif TC',serif;font-size:16px;font-weight:600;margin-bottom:2px;}
  .m-ind-meta{font-size:12px;color:var(--ink-soft);}
  .m-ind-arrow{font-size:16px;color:var(--ink-faint);flex-shrink:0;}
  .m-ind-tags{display:flex;flex-wrap:wrap;gap:4px;padding:0 14px 10px 28px;}
  .m-tag{font-size:12px;padding:3px 9px;border-radius:10px;}
  .m-tag.filled{} .m-tag.empty{border:1px dashed;}

  /* L1 center banner */
  .m-center-banner{background:#2A2218;border-radius:var(--radius);padding:14px;text-align:center;margin-bottom:4px;}
  .m-center-banner .cc-title{color:#F2EAD3;font-size:16px;}
  .m-center-banner .cc-sub{color:var(--gold);font-size:12px;margin-top:2px;margin-bottom:8px;}
  .m-center-stats{display:flex;gap:8px;justify-content:center;}
  .m-cstat{background:rgba(255,255,255,.08);color:#C8B888;font-size:12px;padding:3px 12px;border-radius:4px;}

  /* L2 sub card */
  .m-sub-card{background:var(--surface);border-radius:var(--radius);border:1px solid #E8E4DC;overflow:hidden;cursor:pointer;transition:box-shadow .14s;}
  .m-sub-card:active{opacity:.85;}
  .m-sub-card.empty-sub{cursor:default;border-style:dashed;border-color:var(--ink-faint);background:#FAFAF8;}
  .m-sub-header{display:flex;align-items:center;gap:10px;padding:12px 13px;}
  .m-sub-dot{width:9px;height:9px;border-radius:50%;flex-shrink:0;}
  .m-sub-dot.empty-dot{background:transparent;border:1.5px solid var(--ink-faint);}
  .m-sub-info{flex:1;}
  .m-sub-title{font-size:15px;font-weight:500;margin-bottom:2px;}
  .m-sub-members{font-size:12px;color:var(--ink-soft);}
  .m-sub-arrow{font-size:15px;color:var(--ink-faint);}

  /* L2 center */
  .m-l2-banner{border-radius:var(--radius);padding:13px;text-align:center;margin-bottom:4px;}

  /* L3 member + services */
  .m-member-card{border-radius:var(--radius);padding:16px;text-align:center;margin-bottom:4px;}
  .m-member-card .avatar{margin-bottom:6px;}
  .m-svc-grid{display:grid;grid-template-columns:1fr 1fr;gap:6px;}
  .m-svc-item{background:var(--surface);border-radius:8px;border:1px solid #E8E4DC;padding:10px 11px;position:relative;overflow:hidden;}
  .m-svc-accent{position:absolute;top:0;left:0;right:0;height:2px;}
  .m-svc-title{font-size:13px;font-weight:500;color:var(--ink-mid);}
}

/* desktop: hide card-list */
@media (min-width: 541px) {
  .card-list{display:none;}
}

/* 洪岳裕頁 hyr-view 用 position:fixed overlay */
.hyr-cell{background:var(--surface);border-radius:var(--radius);border:1px solid #E8E4DC;padding:13px 12px;min-height:115px;cursor:pointer;transition:box-shadow .14s,transform .14s;position:relative;overflow:hidden;}
.hyr-cell:hover{box-shadow:0 3px 14px rgba(0,0,0,.08);transform:translateY(-1px);}
.hyr-cell.hyr-center{cursor:default;display:flex;flex-direction:column;align-items:center;justify-content:center;text-align:center;border:none;}
.hyr-cell.hyr-static{cursor:default;pointer-events:none;}
.hyr-cell.hyr-static:hover{box-shadow:none;transform:none;}
@media(max-width:540px){
  .hyr-stage{padding:.65rem .75rem;}
  .hyr-mandala{display:none!important;}
  .hyr-list{display:flex;flex-direction:column;gap:8px;}
  .hyr-m-card{background:#EAF7F4;border-radius:var(--radius);border:1px solid #C8EDEA;overflow:hidden;cursor:pointer;}
  .hyr-m-card:active{opacity:.85;}
  .hyr-m-header{display:flex;align-items:center;gap:10px;padding:13px 14px 10px;}
  .hyr-m-title{font-size:15px;font-weight:500;color:#0A4A3A;flex:1;}
  .hyr-m-arrow{font-size:15px;color:#4CAF98;}
  .hyr-m-tags{display:flex;flex-wrap:wrap;gap:4px;padding:0 14px 11px 33px;}
  .hyr-m-tag{font-size:11px;padding:2px 8px;border-radius:10px;background:#C8EDEA;color:#0A4A3A;}
  .hyr-detail-grid{display:grid;grid-template-columns:1fr 1fr;gap:6px;}
  .hyr-detail-item{background:#EAF7F4;border-radius:8px;border:1px solid #C8EDEA;padding:10px 11px;font-size:13px;font-weight:500;color:#0A4A3A;}
}
@media(min-width:541px){
  .hyr-list{display:none!important;}
  .hyr-mandala{display:grid;grid-template-columns:repeat(3,1fr);gap:var(--gap);}
}

@keyframes fadeUp{from{opacity:0;transform:translateY(6px);}to{opacity:1;transform:translateY(0);}}
.mandala,.card-list{animation:fadeUp .2s ease both;}
</style>
</head>

function p(id){return PAL[id];}
function totalMembers(){let n=0;DATA.forEach(d=>{if(d)d.subs.forEach(s=>{n+=s.members.length;});});return n;}
function isMobile(){return window.innerWidth<=540;}

/* 動態排列：
   - 子項 ≤8（總格9）：中心在正中央（position 4）
   - 子項 ≥9（總格12+）：中心放第一格 */
function arrangeGrid(items){
  const cols=3;
  const n=items.length;
  const total=n+1;
  const rows=Math.ceil(total/cols);
  const slots=cols*rows;
  const arr=[];
  if(n<=8){
    // 中心置中
    const centerPos=Math.floor(slots/2);
    let idx=0;
    for(let i=0;i<slots;i++){
      if(i===centerPos){ arr.push({isCenter:true}); }
      else if(idx<n){ arr.push(items[idx++]); }
      else { arr.push({isBlank:true}); }
    }
  } else {
    // 中心放第一格
    arr.push({isCenter:true});
    items.forEach(it=>arr.push(it));
    while(arr.length<slots) arr.push({isBlank:true});
  }
  return {arr, cols, rows};
}

/* 建立業別→會員查找表 */
function buildLookup(){
  const map={};
  DATA.forEach(d=>{
    if(!d)return;
    d.subs.forEach(s=>{
      if(s.members.length>0) map[s.t]=s.members.map(m=>m.n);
    });
  });
  return map;
}
const MLOOKUP=buildLookup();

function findMembers(label){
  if(MLOOKUP[label]) return MLOOKUP[label];
  for(const key of Object.keys(MLOOKUP)){
    if(label.includes(key)||key.includes(label)) return MLOOKUP[key];
  }
  return null;
}

/* ════ RENDER L2 ════ */

  document.getElementById('nav').innerHTML=`<span class="nav-link" onclick="renderL1()">金安分會</span><span class="nav-sep">›</span><span class="nav-cur">${ind.title}</span>`;
  document.getElementById('hint').textContent='點選子項格查看詳情';
  const stage=document.getElementById('stage');stage.innerHTML='';

    const list=document.createElement('div');list.className='card-list';

      } else {
        card.className='m-sub-card';
        card.style.background=pl.bg;
        const isHYR=sub.members.some(m=>m.n==='洪岳裕');
        const hyrBtn=isHYR?`<div style="padding:0 13px 10px;"><button onclick="event.stopPropagation();showHYR()" style="width:100%;background:${pl.acc};color:#fff;font-size:11px;padding:5px 0;border-radius:8px;cursor:pointer;border:none;font-family:inherit;">查看完整服務地圖 →</button></div>`:'';
        card.innerHTML=`<div class="m-sub-header"><div class="m-sub-dot" style="background:${pl.acc};"></div><div class="m-sub-info"><div class="m-sub-title" style="color:${pl.dark};">${sub.t}</div><div class="m-sub-members" style="color:${pl.acc};">${sub.members.map(m=>m.n).join('・')}</div></div><div class="m-sub-arrow" style="color:${pl.acc};">›</div></div>${hyrBtn}`;
        card.addEventListener('click',()=>renderL3(ind,sub));
      }
      list.appendChild(card);
    });
    stage.appendChild(list);
  } else {
    const {arr,cols,rows}=arrangeGrid(ind.subs);
    const g=document.createElement('div');
    g.className='mandala';
    g.style.gridTemplateColumns=`repeat(${cols},1fr)`;
    arr.forEach(slot=>{
      const div=document.createElement('div');
      if(slot.isCenter){
        div.className='cell center-cell';div.style.background=pl.acc;div.style.border='none';
        div.innerHTML=`<div class="cc2-title" style="color:#fff;">${ind.title}</div><div class="cc2-sub" style="color:rgba(255,255,255,.75);">${memberCount}位會員・${emptyCount}待開發</div>`;
      } else if(slot.isBlank){
        div.className='cell';div.style.background='transparent';div.style.border='none';div.style.cursor='default';div.style.pointerEvents='none';
      } else if(slot.members.length===0){
        div.className='cell empty-cell';div.style.background=pl.bg;
        div.innerHTML=`<div class="empty-label">尚待開發</div><div class="empty-title">${slot.t}</div><div class="empty-note">歡迎推薦合適夥伴</div>`;
      } else {
        div.className='cell';div.style.background=pl.bg;div.style.borderColor=pl.pale;

        }).join('');
        const isHYR=slot.members.some(m=>m.n==='洪岳裕');
        const hyrBtn=isHYR?`<button onclick="event.stopPropagation();showHYR()" style="margin-top:7px;width:100%;background:${pl.acc};color:#fff;font-size:10px;padding:4px 0;border-radius:6px;cursor:pointer;border:none;font-family:inherit;">查看完整服務地圖 →</button>`:'';
        div.innerHTML=`<div class="cell-accent" style="background:${pl.acc};"></div><div class="ct" style="color:${pl.dark};">${slot.t}</div>${membersHTML}${hyrBtn}`;

      }
      g.appendChild(div);
    });
    stage.appendChild(g);
  }
}

/* 根據姓名找到對應的 ind + sub */
function findSubByMember(name){
  for(const d of DATA){
    if(!d) continue;
    for(const s of d.subs){
      if(s.members.some(m=>m.n===name)) return {ind:d, sub:s};
    }
  }
  return null;
}

/* ════ RENDER L3 ════ */
function renderL3(ind,sub){
  currentInd=ind;
  const pl=p(ind.pal);
  document.getElementById('nav').innerHTML=`<span class="nav-link" onclick="renderL1()">金安分會</span><span class="nav-sep">›</span><span class="nav-link" onclick="renderL2(currentInd)">${ind.title}</span><span class="nav-sep">›</span><span class="nav-cur">${sub.t}</span>`;
  document.getElementById('hint').textContent='可互相介紹・合作的周邊產業';
  const stage=document.getElementById('stage');stage.innerHTML='';
  const svcs=SVC[sub.t]||Array(8).fill('合作產業');

  /* 可點擊的會員名字 span */
  function memberSpan(name, color){
    const found=findSubByMember(name);
    if(found){
      return `<span style="color:${color};font-size:10px;font-weight:500;cursor:pointer;text-decoration:underline;text-underline-offset:2px;" onclick="event.stopPropagation();renderL3FromName('${name}')">${name}</span>`;
    }
    return `<span style="color:${color};font-size:10px;font-weight:500;">${name}</span>`;
  }

  // center HTML — 姓名 + 產業別
  let centerHTML='';
  if(sub.members.length===1){
    const m=sub.members[0];
    const extraLink = m.n==='洪岳裕'
      ? `<button onclick="event.stopPropagation();showHYR()" style="margin-top:8px;background:rgba(255,255,255,.2);color:#fff;font-size:11px;padding:5px 12px;border-radius:10px;cursor:pointer;border:1px solid rgba(255,255,255,.5);font-family:inherit;width:100%;">查看完整服務地圖 →</button>`
      : '';
    centerHTML=`<div class="avatar" style="background:rgba(255,255,255,.25);color:#fff;">${m.n[0]}</div><div class="member-name" style="color:#fff;">${m.n}</div><div class="member-role" style="color:rgba(255,255,255,.85);font-size:10px;margin-top:3px;">${sub.t}</div>${extraLink}`;
  } else {
    centerHTML=`<div class="cc2-title" style="color:#fff;">${sub.t}</div><div class="member-multi" style="margin-top:6px;">${sub.members.map(m=>{
      const found=findSubByMember(m.n);
      const clickable=found?`style="cursor:pointer;" onclick="renderL3FromName('${m.n}')"` :'';
      return `<div class="m-row" ${clickable}><div class="m-av" style="background:rgba(255,255,255,.2);color:#fff;">${m.n[0]}</div><div><div class="m-name" style="color:#fff;${found?'text-decoration:underline;text-underline-offset:2px;':''}">${m.n}</div><div style="font-size:9px;color:rgba(255,255,255,.7);">${m.n}</div></div></div>`;
    }).join('')}</div>`;
  }

  // 合作業別格：有會員則名字可點；物理治療的格子可直接進入 HYR 族群
  function makeSvcCell(svc, pl){
    const div=document.createElement('div');
    const matched=findMembers(svc);
    // 如果是洪岳裕的族群，點擊直接進入對應族群
    const hyrGroup = sub.t==='物理治療' ? HYR_GROUPS.find(g=>g&&g.label===svc) : null;
    if(hyrGroup){
      div.className='cell';
      div.style.background=pl.bg;div.style.borderColor=pl.acc;div.style.cursor='pointer';
      div.innerHTML=`<div class="cell-accent" style="background:${pl.acc};opacity:.7;"></div><div class="svc-title" style="color:${pl.dark};margin-bottom:5px;">${svc}</div><div style="font-size:10px;color:${pl.acc};margin-top:4px;">點擊展開 →</div>`;
      div.addEventListener('click',()=>{ showHYR(); setTimeout(()=>hyrRenderL2(hyrGroup),50); });
    } else if(matched){
      div.className='cell no-hover';
      div.style.background=pl.bg;div.style.borderColor=pl.acc;div.style.cursor='default';
      const namesHTML=matched.map(n=>memberSpan(n,pl.acc)).map(s=>`<div class="ci"><div class="ci-dot" style="background:${pl.acc};"></div>${s}</div>`).join('');
      div.innerHTML=`<div class="cell-accent" style="background:${pl.acc};opacity:.6;"></div><div class="svc-title" style="color:${pl.dark};margin-bottom:5px;">${svc}</div>${namesHTML}`;
    } else {
      div.className='cell no-hover';
      div.style.background=pl.bg;div.style.borderColor=pl.pale;
      div.innerHTML=`<div class="cell-accent" style="background:${pl.acc};opacity:.3;"></div><div class="svc-title" style="color:${pl.dark};">${svc}</div>`;
    }
    return div;
  }

  if(isMobile()){
    const list=document.createElement('div');list.className='card-list';
    const mc=document.createElement('div');
    mc.className='m-member-card';mc.style.background=pl.acc;
    mc.innerHTML=centerHTML;
    list.appendChild(mc);
    const sg=document.createElement('div');sg.className='m-svc-grid';
    svcs.forEach(svc=>{
      const matched=findMembers(svc);
      const hyrGroup = sub.t==='物理治療' ? HYR_GROUPS.find(g=>g&&g.label===svc) : null;
      const item=document.createElement('div');
      item.className='m-svc-item';
      item.style.background=pl.bg;
      if(hyrGroup){
        item.style.borderColor=pl.acc;item.style.cursor='pointer';
        item.innerHTML=`<div class="m-svc-accent" style="background:${pl.acc};opacity:.7;"></div><div class="m-svc-title" style="color:${pl.dark};">${svc}</div><div style="font-size:10px;color:${pl.acc};margin-top:3px;">點擊展開 →</div>`;
        item.addEventListener('click',()=>{ showHYR(); setTimeout(()=>hyrRenderL2(hyrGroup),50); });
      } else if(matched){
        item.style.borderColor=pl.acc;
        const namesHTML=matched.map(n=>memberSpan(n,pl.acc)).map(s=>`<div style="margin-top:2px;">▸ ${s}</div>`).join('');
        item.innerHTML=`<div class="m-svc-accent" style="background:${pl.acc};opacity:.6;"></div><div class="m-svc-title" style="color:${pl.dark};margin-bottom:3px;">${svc}</div>${namesHTML}`;
      } else {
        item.innerHTML=`<div class="m-svc-accent" style="background:${pl.acc};opacity:.3;"></div><div class="m-svc-title" style="color:${pl.dark};">${svc}</div>`;
      }
      sg.appendChild(item);
    });
    list.appendChild(sg);
    stage.appendChild(list);
  } else {
    const svcsArr=svcs;
    const {arr,cols}=arrangeGrid(svcsArr);
    const g=document.createElement('div');
    g.className='mandala';
    g.style.gridTemplateColumns=`repeat(${cols},1fr)`;
    arr.forEach(svc=>{
      if(svc&&svc.isCenter){
        const cd=document.createElement('div');
        cd.className='cell center-cell no-hover';
        cd.style.background=pl.acc;cd.style.border='none';
        cd.innerHTML=centerHTML;
        g.appendChild(cd);return;
      }
      if(svc&&svc.isBlank){
        const bd=document.createElement('div');
        bd.style.background='transparent';bd.style.border='none';
        g.appendChild(bd);return;
      }
      g.appendChild(makeSvcCell(svc,pl));
    });
    stage.appendChild(g);
  }
}

/* 從姓名直接跳到個人 L3 */
function renderL3FromName(name){
  const found=findSubByMember(name);
  if(!found) return;
  renderL3(found.ind, found.sub);
}

    grp.items.forEach(item=>{
      const div=document.createElement('div');div.className='hyr-detail-item';
      div.innerHTML=`<div style="width:6px;height:6px;border-radius:50%;background:${HYR_ACC};margin-bottom:6px;"></div>${item}`;
      grid.appendChild(div);
    });
    list.appendChild(grid);
    stage.appendChild(list);
  } else {
    const cols=3;
    const slots=cols*Math.ceil((grp.items.length+1)/cols);
    const centerPos=grp.items.length<=8?Math.floor(slots/2):0;
    const arr=[];let idx=0;
    for(let i=0;i<slots;i++){
      if(i===centerPos) arr.push({isCenter:true});
      else if(idx<grp.items.length) arr.push(grp.items[idx++]);
      else arr.push(null);
    }
    const grid=document.createElement('div');grid.className='hyr-mandala';
    arr.forEach(slot=>{
      const div=document.createElement('div');
      if(slot&&slot.isCenter){
        div.className='hyr-cell hyr-center';div.style.background=HYR_ACC;
        div.innerHTML=`<div style="font-size:10px;color:rgba(255,255,255,.7);margin-bottom:4px;">服務族群</div><div style="font-family:'Noto Serif TC',serif;font-size:15px;font-weight:600;color:#fff;">${grp.label}</div><div style="font-size:10px;color:rgba(255,255,255,.7);margin-top:8px;cursor:pointer;text-decoration:underline;" onclick="hyrRenderL1()">← 返回</div>`;
      } else if(!slot){
        div.style.background='transparent';div.style.border='none';div.style.pointerEvents='none';
      } else {
        div.className='hyr-cell hyr-static';div.style.background=HYR_BG;div.style.borderColor=HYR_PALE;
        div.innerHTML=`<div style="position:absolute;top:0;left:0;right:0;height:3px;background:${HYR_ACC};opacity:.5;border-radius:10px 10px 0 0;"></div><div style="font-family:'Noto Serif TC',serif;font-size:13px;font-weight:600;color:${HYR_DARK};">${slot}</div>`;
      }
      grid.appendChild(div);
    });
    stage.appendChild(grid);
  }
}

renderL1();
window.addEventListener('resize',()=>{
  if(document.getElementById('stage').children.length>0) renderL1();
});
</script>
</body>
</html>
