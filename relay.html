<!DOCTYPE html>
<html lang="zh-TW">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>金安分會｜例會出席回報</title>
<link href="https://fonts.googleapis.com/css2?family=Noto+Sans+TC:wght@300;400;500;700&display=swap" rel="stylesheet">
<style>
  :root {
    --gold: #C9A84C;
    --gold-light: #E8D5A3;
    --gold-dark: #8B6914;
    --ink: #1A1A1A;
    --ink-soft: #3D3D3D;
    --ink-muted: #777;
    --paper: #FAFAF8;
    --paper-warm: #F4F0E8;
    --border: #E0D8C8;
    --success: #2D6A4F;
    --success-bg: #D8F3DC;
    --warning-bg: #FFF3CD;
    --warning: #856404;
    --danger-bg: #FDECEA;
    --danger: #C0392B;
    --radius: 10px;
    --shadow: 0 2px 16px rgba(0,0,0,0.07);
  }

  * { box-sizing: border-box; margin: 0; padding: 0; }

  body {
    font-family: 'Noto Sans TC', sans-serif;
    background: var(--paper);
    color: var(--ink);
    min-height: 100vh;
  }

  /* Header */
  .header {
    background: var(--ink);
    padding: 20px 24px;
    display: flex;
    align-items: center;
    gap: 14px;
  }
  .header-emblem {
    width: 40px; height: 40px;
    border: 1.5px solid var(--gold);
    border-radius: 50%;
    display: flex; align-items: center; justify-content: center;
    font-size: 16px; color: var(--gold); font-weight: 700;
    flex-shrink: 0;
  }
  .header-text { flex: 1; }
  .header-title { font-size: 16px; font-weight: 500; color: #fff; letter-spacing: 0.05em; }
  .header-sub { font-size: 12px; color: var(--gold-light); margin-top: 2px; }

  /* Main container */
  .container { max-width: 480px; margin: 0 auto; padding: 24px 16px 60px; }

  /* Step indicator */
  .steps {
    display: flex; align-items: center; gap: 0;
    margin-bottom: 28px;
  }
  .step-item {
    display: flex; align-items: center; gap: 6px;
    font-size: 12px; color: var(--ink-muted);
  }
  .step-item.active { color: var(--gold-dark); }
  .step-item.done { color: var(--success); }
  .step-num {
    width: 22px; height: 22px; border-radius: 50%;
    border: 1.5px solid var(--border);
    display: flex; align-items: center; justify-content: center;
    font-size: 11px; font-weight: 500; background: var(--paper);
  }
  .step-item.active .step-num { border-color: var(--gold); background: var(--gold); color: #fff; }
  .step-item.done .step-num { border-color: var(--success); background: var(--success); color: #fff; }
  .step-line { flex: 1; height: 1px; background: var(--border); margin: 0 4px; }

  /* Section card */
  .card {
    background: #fff;
    border: 1px solid var(--border);
    border-radius: var(--radius);
    overflow: hidden;
    margin-bottom: 16px;
    box-shadow: var(--shadow);
  }
  .card-header {
    padding: 14px 18px;
    border-bottom: 1px solid var(--border);
    background: var(--paper-warm);
    font-size: 13px; font-weight: 500; color: var(--ink-soft);
    display: flex; align-items: center; gap: 8px;
  }
  .card-header .dot {
    width: 6px; height: 6px; border-radius: 50%;
    background: var(--gold);
  }

  /* Group grid */
  .group-grid {
    display: grid; grid-template-columns: repeat(4, 1fr); gap: 8px;
    padding: 16px;
  }
  .group-btn {
    padding: 12px 4px; border: 1px solid var(--border);
    border-radius: 8px; background: #fff;
    cursor: pointer; font-size: 14px; font-weight: 500;
    color: var(--ink-soft); transition: all 0.15s;
    font-family: 'Noto Sans TC', sans-serif;
    text-align: center;
  }
  .group-btn:hover { border-color: var(--gold); color: var(--gold-dark); background: #FFFBF2; }
  .group-btn.selected { border-color: var(--gold); background: var(--gold); color: #fff; }

  /* Member grid */
  .member-grid {
    display: grid; grid-template-columns: repeat(3, 1fr); gap: 8px;
    padding: 16px;
  }
  .member-btn {
    padding: 11px 6px; border: 1px solid var(--border);
    border-radius: 8px; background: #fff;
    cursor: pointer; font-size: 15px; font-weight: 400;
    color: var(--ink); transition: all 0.15s;
    font-family: 'Noto Sans TC', sans-serif;
    text-align: center;
  }
  .member-btn:hover { border-color: var(--gold); background: #FFFBF2; }
  .member-btn.selected { border-color: var(--gold); background: var(--gold); color: #fff; font-weight: 500; }

  /* Selected display */
  .selection-display {
    display: flex; align-items: center; gap: 10px;
    padding: 12px 18px; background: #FFFBF2;
    border-bottom: 1px solid var(--border);
    font-size: 14px; color: var(--ink-soft);
  }
  .selection-chip {
    background: var(--gold); color: #fff;
    padding: 3px 10px; border-radius: 20px;
    font-size: 13px; font-weight: 500;
  }
  .change-btn {
    margin-left: auto; font-size: 12px; color: var(--gold-dark);
    background: none; border: none; cursor: pointer;
    font-family: 'Noto Sans TC', sans-serif; text-decoration: underline;
  }

  /* Form fields */
  .field-list { padding: 8px 0; }
  .field-row {
    display: flex; align-items: center;
    padding: 12px 18px; border-bottom: 1px solid var(--border);
    gap: 12px;
  }
  .field-row:last-child { border-bottom: none; }
  .field-label { font-size: 14px; color: var(--ink-soft); flex: 0 0 80px; }
  .field-control { flex: 1; display: flex; gap: 6px; flex-wrap: wrap; align-items: center; }

  /* Attend buttons */
  .attend-btn {
    padding: 6px 14px; border: 1px solid var(--border);
    border-radius: 20px; background: #fff; cursor: pointer;
    font-size: 13px; color: var(--ink-soft); transition: all 0.15s;
    font-family: 'Noto Sans TC', sans-serif;
  }
  .attend-btn:hover { border-color: var(--ink-muted); }
  .attend-btn.on-attend { background: var(--success-bg); border-color: var(--success); color: var(--success); font-weight: 500; }
  .attend-btn.on-proxy { background: var(--warning-bg); border-color: var(--warning); color: var(--warning); font-weight: 500; }
  .attend-btn.on-absent { background: var(--danger-bg); border-color: var(--danger); color: var(--danger); font-weight: 500; }

  /* Number inputs */
  input[type="number"], input[type="text"] {
    padding: 7px 12px; border: 1px solid var(--border);
    border-radius: 8px; background: var(--paper);
    font-size: 14px; color: var(--ink);
    font-family: 'Noto Sans TC', sans-serif;
    transition: border 0.15s;
    outline: none;
  }
  input[type="number"] { width: 72px; text-align: center; }
  input[type="text"] { width: 100%; }
  input:focus { border-color: var(--gold); background: #fff; }
  input::placeholder { color: #bbb; }

  /* Submit button */
  .submit-btn {
    width: 100%; padding: 14px;
    background: var(--ink); color: #fff;
    border: none; border-radius: var(--radius);
    font-size: 15px; font-weight: 500;
    font-family: 'Noto Sans TC', sans-serif;
    cursor: pointer; transition: all 0.2s;
    margin-top: 8px;
    letter-spacing: 0.05em;
  }
  .submit-btn:hover { background: var(--ink-soft); }
  .submit-btn:disabled { background: #ccc; cursor: not-allowed; }
  .submit-btn.loading { background: var(--ink-muted); }

  /* Toast / success */
  .toast {
    position: fixed; top: 20px; left: 50%; transform: translateX(-50%);
    background: var(--success); color: #fff;
    padding: 12px 24px; border-radius: 8px;
    font-size: 14px; font-weight: 500;
    opacity: 0; transition: opacity 0.3s;
    pointer-events: none; z-index: 999;
    white-space: nowrap;
  }
  .toast.show { opacity: 1; }
  .toast.error { background: var(--danger); }

  /* Hidden */
  .hidden { display: none !important; }

  /* Mode selection */
  .mode-bar {
    display: flex; gap: 10px; margin-bottom: 16px;
  }
  .mode-btn {
    flex: 1; padding: 14px 8px;
    border: 1px solid var(--border); border-radius: var(--radius);
    background: #fff; cursor: pointer;
    font-size: 14px; font-weight: 500; color: var(--ink-soft);
    font-family: "Noto Sans TC", sans-serif;
    transition: all 0.15s; text-align: center; line-height: 1.5;
  }
  .mode-btn:hover { border-color: var(--gold); background: #FFFBF2; }
  .mode-btn.mode-new { border-color: var(--success); background: var(--success-bg); color: var(--success); }
  .mode-btn.mode-edit { border-color: #1a73e8; background: #e8f0fe; color: #1a73e8; }
  .mode-note { font-size: 11px; font-weight: 400; display: block; margin-top: 2px; opacity: 0.8; }

  /* Week display */
  .week-bar {
    display: flex; align-items: center; gap: 8px;
    padding: 12px 0 0;
  }
  .week-label { font-size: 13px; color: var(--ink-muted); }
  .week-value { font-size: 14px; font-weight: 500; color: var(--gold-dark); }

  /* Status page */
  .tab-bar {
    display: flex; gap: 0; margin-bottom: 20px;
    border-bottom: 1.5px solid var(--border);
  }
  .tab-btn {
    flex: 1; padding: 11px 8px; background: none;
    border: none; border-bottom: 2.5px solid transparent;
    margin-bottom: -1.5px; font-size: 14px; font-weight: 500;
    color: var(--ink-muted); cursor: pointer;
    font-family: 'Noto Sans TC', sans-serif; transition: all 0.15s;
  }
  .tab-btn.active { color: var(--gold-dark); border-bottom-color: var(--gold); }
  .group-status-card {
    background: #fff; border: 1px solid var(--border);
    border-radius: var(--radius); margin-bottom: 12px;
    overflow: hidden; box-shadow: var(--shadow);
  }
  .group-status-header {
    display: flex; align-items: center; justify-content: space-between;
    padding: 12px 16px; background: var(--paper-warm);
    border-bottom: 1px solid var(--border);
    font-size: 14px; font-weight: 500; color: var(--ink-soft);
  }
  .group-status-count { font-size: 12px; color: var(--ink-muted); font-weight: 400; }
  .member-status-list { display: flex; flex-wrap: wrap; gap: 8px; padding: 12px 16px; }
  .member-tag {
    padding: 5px 12px; border-radius: 20px; font-size: 13px;
  }
  .member-tag.filled { background: var(--success-bg); color: var(--success); }
  .member-tag.unfilled { background: #f0f0f0; color: var(--ink-muted); }
  .status-loading { text-align: center; font-size: 13px; color: var(--ink-muted); padding: 32px 0; }
  .progress-bar-wrap {
    height: 4px; background: var(--border); border-radius: 2px;
    margin: 0 16px 12px; overflow: hidden;
  }
  .progress-bar-fill {
    height: 100%; background: var(--success); border-radius: 2px;
    transition: width 0.4s;
  }
</style>
</head>
<body>

<div class="header">
  <div class="header-emblem">金</div>
  <div class="header-text">
    <div class="header-title">金安分會</div>
    <div class="header-sub">例會出席回報</div>
  </div>
</div>

<div class="container">
  <div class="tab-bar">
    <button class="tab-btn active" id="tabFill" onclick="switchTab('fill')">填寫接龍</button>
    <button class="tab-btn" id="tabStatus" onclick="switchTab('status')">本週狀況</button>
  </div>

  <!-- Status page -->
  <div id="pageStatus" class="hidden">
    <div id="statusContent" class="status-loading">載入中…</div>
  </div>

  <!-- Fill page -->
  <div id="pageFill">
  <div class="week-bar">
    <span class="week-label">本週週會</span>
    <span class="week-value" id="weekDisplay"></span>
  </div>

  <!-- Step indicator -->
  <div class="steps" style="margin-top:16px;">
    <div class="step-item active" id="s1">
      <div class="step-num">1</div>
      <span>選小組</span>
    </div>
    <div class="step-line"></div>
    <div class="step-item" id="s2">
      <div class="step-num">2</div>
      <span>選姓名</span>
    </div>
    <div class="step-line"></div>
    <div class="step-item" id="s3">
      <div class="step-num">3</div>
      <span>填資料</span>
    </div>
  </div>

  <!-- Step 1: Group -->
  <div id="step1">
    <div class="card">
      <div class="card-header"><div class="dot"></div>請選擇你的小組</div>
      <div class="group-grid" id="groupGrid"></div>
    </div>
  </div>

  <!-- Step 2: Member -->
  <div id="step2" class="hidden">
    <div class="card">
      <div class="card-header"><div class="dot"></div>請選擇你的姓名</div>
      <div class="selection-display">
        <span id="selGroupChip" class="selection-chip"></span>
        <button class="change-btn" onclick="goStep(1)">重選小組</button>
      </div>
      <div class="member-grid" id="memberGrid"></div>
    </div>
  </div>

  <!-- Mode selection -->
  <div id="stepMode" class="hidden">
    <div class="card">
      <div class="card-header"><div class="dot"></div>你要做什麼？</div>
      <div class="selection-display">
        <span id="selMemberChipMode" class="selection-chip"></span>
        <span id="selGroupLabelMode" style="font-size:13px; color:var(--ink-muted);"></span>
        <button class="change-btn" onclick="goStep(2)">重選姓名</button>
      </div>
      <div style="padding:16px;">
        <div id="loadingHint" style="text-align:center; font-size:13px; color:var(--ink-muted); padding:12px 0;">查詢本週紀錄中…</div>
        <div id="modeButtons" class="hidden">
          <div class="mode-bar">
            <button class="mode-btn" id="newModeBtn" onclick="selectMode('new')">填寫</button>
            <button class="mode-btn" id="editModeBtn" onclick="selectMode('edit')">修改</button>
          </div>
        </div>
      </div>
    </div>
  </div>

  <!-- Step 3: Form -->
  <div id="step3" class="hidden">
    <div class="card">
      <div class="card-header"><div class="dot"></div>填寫本週回報資料</div>
      <div class="selection-display">
        <span id="selMemberChip" class="selection-chip"></span>
        <span id="selGroupLabel" style="font-size:13px; color:var(--ink-muted);"></span>
        <button class="change-btn" onclick="goStep(2)">重選姓名</button>
      </div>
      <div class="field-list">
        <div class="field-row" style="align-items:flex-start; padding-top:14px; padding-bottom:14px;">
          <div class="field-label" style="padding-top:4px;">出席狀況</div>
          <div class="field-control" style="flex-wrap:wrap; gap:8px;">
            <button class="attend-btn" id="btn-本人" onclick="setAttend('本人')">本人</button>
            <button class="attend-btn" id="btn-代理人" onclick="setAttend('代理人')">代理人</button>
          </div>
        </div>
        <div class="field-row">
          <div class="field-label">一對一</div>
          <div class="field-control">
            <input type="number" id="f-oto" min="0" placeholder="0" />
          </div>
        </div>
        <div class="field-row">
          <div class="field-label">內部引薦</div>
          <div class="field-control">
            <input type="number" id="f-internal" min="0" placeholder="0" />
          </div>
        </div>
        <div class="field-row">
          <div class="field-label">外部引薦</div>
          <div class="field-control">
            <input type="number" id="f-external" min="0" placeholder="0" />
          </div>
        </div>
        <div class="field-row">
          <div class="field-label">金額總計</div>
          <div class="field-control">
            <input type="text" id="f-amount" placeholder="輸入金額（選填）" style="width:160px;" />
          </div>
        </div>
        <div class="field-row">
          <div class="field-label">培訓</div>
          <div class="field-control">
            <input type="number" id="f-training" min="0" placeholder="0" />
          </div>
        </div>
        <div class="field-row">
          <div class="field-label">來賓</div>
          <div class="field-control">
            <input type="number" id="f-guest" min="0" placeholder="0" />
          </div>
        </div>
      </div>
    </div>
    <button class="submit-btn" id="submitBtn" onclick="submitForm()">送出回報</button>
  </div>
</div>
</div>

<div class="toast" id="toast"></div>

<script>
const SHEET_URL = 'https://script.google.com/macros/s/AKfycbzNS8QVntl0LmZ64z2F7Bf9DV9MyOFueo37ZJDz_qnnWgR8UybV8brPZY0KTa3FPNogrQ/exec';

const groups = {
  '第1組': ['胡哲維','吳宗恒','何英銘','洪梓承'],
  '第2組': ['彭欣如','陳宥寧','洪岳裕','殷如蒔','李赫茗','許宏暐'],
  '第3組': ['徐凡雅','李佳家','陳芊妤','羅美淇','陳炯霖'],
  '第4組': ['王博翰','劉芯怡','朱世祺','陳庭漢','洪佑宜'],
  '第5組': ['簡茹瑩','邱瑞瑋','蕭淑蓉','高翊峯','林穎宏','謝佳恩'],
  '第6組': ['賴佩玲','廖羿為','林楷鈞','劉耿逢','林文偉','陳鳳琴'],
  '第7組': ['許哲文','練羿岑','黃奕甫','邱致憲','曹雅茲','邱雅鈴'],
  '第8組': ['張睿样','趙翊帆','周聖強','林澐薪','劉鎧霆'],
};

let selGroup = '', selMember = '', attendStatus = '';

// Auto-compute closest upcoming Friday
const weekDate = (function() {
  const today = new Date();
  const d = new Date(today);
  const day = d.getDay(); // 0=Sun, 5=Fri
  const diff = day <= 5 ? 5 - day : 7 - day + 5;
  d.setDate(d.getDate() + diff);
  const m = d.getMonth() + 1;
  const dd = d.getDate();
  return m + '/' + dd + '（週五）';
})();
document.getElementById('weekDisplay').textContent = weekDate;

// Render groups
const groupGrid = document.getElementById('groupGrid');
Object.keys(groups).forEach(g => {
  const btn = document.createElement('button');
  btn.className = 'group-btn';
  btn.textContent = g;
  btn.onclick = () => {
    selGroup = g;
    document.querySelectorAll('.group-btn').forEach(b => b.classList.remove('selected'));
    btn.classList.add('selected');
    renderMembers(g);
    setTimeout(() => goStep(2), 180);
  };
  groupGrid.appendChild(btn);
});

function renderMembers(g) {
  const grid = document.getElementById('memberGrid');
  grid.innerHTML = '';
  groups[g].forEach(m => {
    const btn = document.createElement('button');
    btn.className = 'member-btn';
    btn.textContent = m;
    btn.onclick = () => {
      selMember = m;
      document.querySelectorAll('.member-btn').forEach(b => b.classList.remove('selected'));
      btn.classList.add('selected');
      document.getElementById('selMemberChipMode').textContent = m;
      document.getElementById('selGroupLabelMode').textContent = g;
      document.getElementById('selMemberChip').textContent = m;
      document.getElementById('selGroupLabel').textContent = g;
      resetForm();
      setTimeout(() => { goStep('mode'); checkExisting(); }, 180);
    };
    grid.appendChild(btn);
  });
}

function goStep(n) {
  document.getElementById('step1').classList.add('hidden');
  document.getElementById('step2').classList.add('hidden');
  document.getElementById('stepMode').classList.add('hidden');
  document.getElementById('step3').classList.add('hidden');

  if (n === 'mode') {
    document.getElementById('stepMode').classList.remove('hidden');
    document.getElementById('s1').className = 'step-item done';
    document.getElementById('s2').className = 'step-item done';
    document.getElementById('selGroupChip').textContent = selGroup;
    document.getElementById('s3').className = 'step-item';
    return;
  }

  document.getElementById('step' + n).classList.remove('hidden');
  if (n >= 1) document.getElementById('s1').className = 'step-item ' + (n === 1 ? 'active' : 'done');
  if (n >= 2) {
    document.getElementById('s2').className = 'step-item ' + (n === 2 ? 'active' : n > 2 ? 'done' : '');
    document.getElementById('selGroupChip').textContent = selGroup;
  }
  if (n === 3) document.getElementById('s3').className = 'step-item active';
  else document.getElementById('s3').className = 'step-item';
}

function setAttend(v) {
  attendStatus = v;
  document.querySelectorAll('.attend-btn').forEach(b => b.className = 'attend-btn');
  const cls = v === '本人' ? 'on-attend' : 'on-proxy';
  document.getElementById('btn-' + v).className = 'attend-btn ' + cls;
}

function resetForm() {
  attendStatus = '';
  document.querySelectorAll('.attend-btn').forEach(b => b.className = 'attend-btn');
  ['f-oto','f-internal','f-external','f-amount','f-training','f-guest'].forEach(id => {
    document.getElementById(id).value = '';
  });
}

function showToast(msg, isError) {
  const t = document.getElementById('toast');
  t.textContent = msg;
  t.className = 'toast show' + (isError ? ' error' : '');
  setTimeout(() => t.className = 'toast', 2500);
}

let editMode = false;

async function checkExisting() {
  existingData = null;
  document.getElementById('loadingHint').classList.remove('hidden');
  document.getElementById('modeButtons').classList.add('hidden');

  try {
    const url = SHEET_URL + '?action=get&week=' + encodeURIComponent(weekDate) + '&name=' + encodeURIComponent(selMember);
    const res = await fetch(url);
    const data = await res.json();

    document.getElementById('loadingHint').classList.add('hidden');
    document.getElementById('modeButtons').classList.remove('hidden');

    if (data && data.status === 'ok') {
      // 有資料，只顯示修改
      existingData = data;
      document.getElementById('newModeBtn').style.display = 'none';
      document.getElementById('editModeBtn').style.display = '';
    } else {
      // 沒資料，只顯示新填
      document.getElementById('newModeBtn').style.display = '';
      document.getElementById('editModeBtn').style.display = 'none';
    }
  } catch(err) {
    document.getElementById('loadingHint').classList.add('hidden');
    document.getElementById('modeButtons').classList.remove('hidden');
    document.getElementById('newModeBtn').style.display = '';
    document.getElementById('editModeBtn').style.display = 'none';
  }
}
let existingData = null;

async function selectMode(mode) {
  if (mode === 'new') {
    editMode = false;
    resetForm();
    goStep(3);
  } else {
    // 直接用已查好的資料帶入
    editMode = true;
    resetForm();
    if (existingData.attend) setAttend(existingData.attend);
    document.getElementById('f-oto').value = existingData.oto || '';
    document.getElementById('f-internal').value = existingData.internal || '';
    document.getElementById('f-external').value = existingData.external || '';
    document.getElementById('f-amount').value = existingData.amount || '';
    document.getElementById('f-training').value = existingData.training || '';
    document.getElementById('f-guest').value = existingData.guest || '';
    goStep(3);
  }
}

function switchTab(tab) {
  if (tab === 'fill') {
    document.getElementById('pageFill').classList.remove('hidden');
    document.getElementById('pageStatus').classList.add('hidden');
    document.getElementById('tabFill').classList.add('active');
    document.getElementById('tabStatus').classList.remove('active');
  } else {
    document.getElementById('pageFill').classList.add('hidden');
    document.getElementById('pageStatus').classList.remove('hidden');
    document.getElementById('tabFill').classList.remove('active');
    document.getElementById('tabStatus').classList.add('active');
    loadStatus();
  }
}

async function loadStatus() {
  const el = document.getElementById('statusContent');
  el.className = 'status-loading';
  el.textContent = '載入中…';

  try {
    const url = SHEET_URL + '?action=getWeek&week=' + encodeURIComponent(weekDate);
    const res = await fetch(url);
    const data = await res.json();
    const filled = new Set(data.names || []);

    let html = '';
    Object.entries(groups).forEach(([gName, members]) => {
      const filledCount = members.filter(m => filled.has(m)).length;
      const pct = Math.round(filledCount / members.length * 100);
      html += '<div class="group-status-card">';
      html += '<div class="group-status-header">';
      html += '<span>' + gName + '</span>';
      html += '<span class="group-status-count">' + filledCount + ' / ' + members.length + ' 人已填</span>';
      html += '</div>';
      html += '<div class="progress-bar-wrap"><div class="progress-bar-fill" style="width:' + pct + '%"></div></div>';
      html += '<div class="member-status-list">';
      members.forEach(m => {
        const cls = filled.has(m) ? 'filled' : 'unfilled';
        html += '<span class="member-tag ' + cls + '">' + m + '</span>';
      });
      html += '</div></div>';
    });

    el.className = '';
    el.innerHTML = html;
  } catch(err) {
    el.textContent = '載入失敗，請重試';
  }
}

async function submitForm() {
  if (!selGroup || !selMember) return showToast('請先選擇小組與姓名', true);
  if (!attendStatus) return showToast('請選擇出席狀況', true);

  const payload = {
    week:     weekDate,
    editMode: editMode,
    group:    selGroup,
    name:     selMember,
    attend:   attendStatus,
    oto:      document.getElementById('f-oto').value || '0',
    internal: document.getElementById('f-internal').value || '0',
    external: document.getElementById('f-external').value || '0',
    amount:   document.getElementById('f-amount').value || '',
    training: document.getElementById('f-training').value || '',
    guest:    document.getElementById('f-guest').value || '0',
  };

  if (!SHEET_URL) {
    // 尚未設定 Sheet URL，顯示資料預覽
    showToast('✓ 填報完成（尚未串接 Sheet）', false);
    console.log('填報資料：', payload);
    return;
  }

  const btn = document.getElementById('submitBtn');
  btn.disabled = true;
  btn.textContent = '送出中…';
  btn.className = 'submit-btn loading';

  try {
    await fetch(SHEET_URL, {
      method: 'POST',
      mode: 'no-cors',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify(payload)
    });
    showToast('✓ 回報成功！', false);
    setTimeout(() => {
      resetForm();
      goStep(1);
      selGroup = ''; selMember = '';
      document.querySelectorAll('.group-btn, .member-btn').forEach(b => b.classList.remove('selected'));
    }, 1500);
  } catch (err) {
    showToast('送出失敗，請重試', true);
  } finally {
    btn.disabled = false;
    btn.textContent = '送出回報';
    btn.className = 'submit-btn';
  }
}
</script>
</body>
</html>
